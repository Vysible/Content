  # Positionierungsvorlage: Kieferorthopädie

  ## Leistungsschwerpunkte
  - Festsitzende Apparaturen (Brackets, Bänder)
  - Herausnehmbare Aligner-Therapie
  - Frühbehandlung ab 6 Jahren
  - Erwachsenenbehandlung

  ## Zielgruppe
  Eltern mit Kindern 8–16 Jahre, Erwachsene mit ästhetischem Interesse.

  ## Tonalität
  Modern, jugendlich-frisch, kompetent.

  ## USPs
  - Unsichtbare Aligner-Therapie
  - Zertifizierter Invisalign-Anbieter
  - Digitale 3D-Planung
