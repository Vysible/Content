  # Positionierungsvorlage: Zahnarztpraxis

  ## Leistungsschwerpunkte
  - Prophylaxe und professionelle Zahnreinigung
  - Ästhetische Zahnmedizin (Bleaching, Veneers)
  - Implantologie
  - Kinderzahnheilkunde

  ## Zielgruppe
  Familien im lokalen Einzugsgebiet, Erwachsene 25–55 Jahre, gesundheitsbewusst.

  ## Tonalität
  Warm, vertrauenswürdig, kompetent, nicht zu akademisch.

  ## USPs
  - Angstpatienten willkommen
  - Modernste Technik (DVT, CEREC)
  - Kurze Wartezeiten
