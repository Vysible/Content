services:
  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PLAYWRIGHT_SERVICE_URL: http://playwright:3001
    depends_on:
      playwright:
        condition: service_healthy
    networks:
      - coolify
      - default
    labels:
      - traefik.enable=true
      - traefik.http.routers.vysible.rule=Host(`vysible.online`)
      - traefik.http.routers.vysible.entrypoints=https
      - traefik.http.routers.vysible.tls=true
      - traefik.http.routers.vysible.tls.certresolver=letsencrypt
      - traefik.http.services.vysible.loadbalancer.server.port=3000
      - traefik.http.routers.vysible-http.rule=Host(`vysible.online`)
      - traefik.http.routers.vysible-http.entrypoints=http
      - traefik.http.routers.vysible-http.middlewares=redirect-to-https
    restart: unless-stopped

  playwright:
    build: ./services/playwright
    networks:
      - default
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
