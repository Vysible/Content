services:
  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://vysible.cloud
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      NEXT_PUBLIC_APP_URL: https://vysible.cloud
      PLAYWRIGHT_SERVICE_URL: http://playwright:3001
    depends_on:
      playwright:
        condition: service_healthy
    networks:
      - coolify
      - default
    restart: unless-stopped

  playwright:
    build: ./services/playwright
    networks:
      - default
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  coolify:
    external: true
  default:
    driver: bridge

volumes:
  postgres_data:
