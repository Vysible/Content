# forge-sync.yml — ForgeWeb Auto-Sync workflow template for consumer projects.
#
# SETUP: Copy this file to .github/workflows/forge-sync.yml in your consumer project.
#        Or run: forge-web sync --project-root <your-project> (auto-deploys this file).
#
# UPDATES: Do not edit this file to change the ForgeWeb version. The ForgeWeb maintainer
#          sends version updates centrally via forge-web broadcast-update.
#          The version arrives as a workflow dispatch input (forge_web_version) —
#          your workflow file stays unchanged.
#
# See: docs/forge-web-autosync-quickstart.md for the full setup guide.
# ADR reference: ADR-W007 (Sync Phase-2 with manifest validation)

name: ForgeWeb Auto-Sync

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC (fallback — uses default version below)
  workflow_dispatch:
    inputs:
      forge_web_version:
        description: 'ForgeWeb version to install (e.g. 0.3.1). Sent by forge-web broadcast-update.'
        required: true
        default: '0.3.1'   # Update this default when you adopt a new ForgeWeb version locally.
      force_sync:
        description: 'Force sync even if conflicts detected (skips deviation guard)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ForgeWeb at requested version
        # Uses npm global install — works in CI without SSH key configuration.
        run: npm install -g forge-web@${{ inputs.forge_web_version }}

      - name: Sync forge-web rules
        # Exit-Code-Semantik:
        # 0 = Sync erfolgreich (0 oder mehr changes)
        # 1 = Sync-Fehler (interner Fehler)
        # 4 = Conflicts detected → docs/forge-web-deviations.md wurde aktualisiert
        #     PR wird trotzdem erstellt damit Maintainer die Deviations reviewen kann
        run: forge-web sync --project-root .
        continue-on-error: true
        id: sync_step

      - name: Check sync exit code
        run: |
          if [ "${{ steps.sync_step.outcome }}" = "failure" ]; then
            # Exit-Code 4 = Conflicts → weiter mit PR-Erstellung
            echo "Conflicts detected — creating PR for deviation review"
          fi

      - name: Open pull request if rules changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync forge-web rules to ${{ inputs.forge_web_version }}'
          branch: auto/forge-web-sync
          title: 'ForgeWeb rule update — ${{ inputs.forge_web_version }}'
          body: |
            Automated update from the ForgeWeb framework.
            Version: **${{ inputs.forge_web_version }}**

            Review the diff in `.cursor/rules/` and `.windsurf/rules/` and merge when satisfied.
            If this PR was not opened by the ForgeWeb maintainer, check your workflow schedule.
