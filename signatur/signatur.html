<!--
  E-Mail-Signatur – Dr. Markus Werner
  ====================================
  Anleitung für Apple Mail:
  1. Lege diese Datei (signatur.html) und deine PNG (signatur.png)
     in denselben Ordner, z.B. auf den Desktop.
  2. Öffne signatur.html in Safari.
  3. Drücke Cmd+A (alles auswählen), dann Cmd+C (kopieren).
  4. Öffne Apple Mail → Einstellungen (Cmd+,) → Signaturen.
  5. Klicke auf +, lösche den Platzhaltertext.
  6. Drücke Cmd+V (einfügen) – das Bild mit Links wird eingefügt.
  7. Schließe die Einstellungen.

  Koordinaten basieren auf Anzeigebreite 600 px.
  Falls Klickbereiche nicht passen: coords="x1,y1,x2,y2" anpassen.
-->

<img src="signatur.png"
     width="600"
     border="0"
     usemap="#signatur"
     alt="Dr. Markus Werner – Praxis Signatur"
     style="display:block;border:0;outline:0;text-decoration:none;">

<map name="signatur">

  <!-- Telefon: T 04921 43012 -->
